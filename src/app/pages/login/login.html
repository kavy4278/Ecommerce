<div class="login-container">
    <mat-card class="login-card">
        <mat-card-header>
            <mat-card-title>
                <div class="flex items-center gap-2">
                    <mat-icon class="text-blue-600">account_circle</mat-icon>
                    <span>Sign In</span>
                </div>
            </mat-card-title>
            <mat-card-subtitle>Welcome back! Please enter your credentials.</mat-card-subtitle>
        </mat-card-header>

        <mat-card-content class="mt-6">
            <form (ngSubmit)="onSubmit()" class="flex flex-col gap-4">

                <mat-form-field appearance="outline" class="w-full">
                    <mat-label>Email</mat-label>
                    <input matInput type="email" [(ngModel)]="email" name="email"
                           placeholder="you@example.com" required>
                    <mat-icon matPrefix>email</mat-icon>
                </mat-form-field>

                <mat-form-field appearance="outline" class="w-full">
                    <mat-label>Password</mat-label>
                    <input matInput [type]="hidePassword ? 'password' : 'text'"
                           [(ngModel)]="password" name="password" required>
                    <mat-icon matPrefix>lock</mat-icon>
                    <button mat-icon-button matSuffix type="button"
                            (click)="hidePassword = !hidePassword">
                        <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
                    </button>
                </mat-form-field>

                <button mat-flat-button color="primary" type="submit"
                        class="w-full !py-3 !text-base !rounded-lg !mt-2"
                        [disabled]="!email || !password">
                    Sign In
                </button>
            </form>
        </mat-card-content>

        <mat-card-actions class="!px-4 !pb-4">
            <div class="w-full text-center">
                <span class="text-gray-500 text-sm">Don't have an account?</span>
                <a mat-button color="primary" routerLink="/signup" class="!text-sm">
                    Create Account
                </a>
            </div>
        </mat-card-actions>
    </mat-card>
</div>
